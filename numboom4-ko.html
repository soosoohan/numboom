<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getFirestore, collection, addDoc, query, where, orderBy, limit, getDocs, getCountFromServer }
 from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB71VorPAYtzyMomJM2W7xkn3D_SeuoStg",
  authDomain: "numboom-ad0a8.firebaseapp.com",
  projectId: "numboom-ad0a8",
  storageBucket: "numboom-ad0a8.firebasestorage.app",
  messagingSenderId: "1098774470017",
  appId: "1:1098774470017:web:944d7e4aa0ff6ceb2adc80",
  measurementId: "G-N5ZVL5GYFS"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ROWS = 4, COLS = 4;
const MODE = 'numboom4x4';
const QUEUE_SIZE = 3;
const CONSONANTS = 'BCDFGHJKLMNPQRSTVWXZ';
const DIGITS = '23456789';

const NUMBER_CARDS = [2, 4];
const BOMB_CARDS = [
 { emoji: '🔥', div: 2 },
 { emoji: '💥', div: 4 },
 { emoji: '⚡', div: 0 }, // 0 = 소멸
];
const BOMB_BG = { '🔥': '#8B4513', '💥': '#CC3300', '⚡': '#2d1b2e' };

const COLOR_MAP = {
 2:      { bg: '#B8E986', fg: '#2F4F1F' },
 4:      { bg: '#7ED957', fg: '#FFFFFF' },
 8:      { bg: '#4DD0E1', fg: '#FFFFFF' },
 16:     { bg: '#42A5F5', fg: '#FFFFFF' },
 32:     { bg: '#7E57C2', fg: '#FFFFFF' },
 64:     { bg: '#EC407A', fg: '#FFFFFF' },
 128:    { bg: '#FFA726', fg: '#FFFFFF' },
 256:    { bg: '#FF7043', fg: '#FFFFFF' },
 512:    { bg: '#E53935', fg: '#FFFFFF' },
 1024:   { bg: '#B0BEC5', fg: '#263238' },
 2048:   { bg: '#FFF8E1', fg: '#F57C00' },
 4096:   { bg: '#FFE082', fg: '#8D6E00' },
 8192:   { bg: '#FFD54F', fg: '#6D4C00' },
 16384:  { bg: '#F8BBD0', fg: '#880E4F' },
 32768:  { bg: '#CE93D8', fg: '#4A148C' },
 65536:  { bg: '#90CAF9', fg: '#0D47A1' },
 131072: { bg: '#80CBC4', fg: '#004D40' },
};
function getColor(v) { return COLOR_MAP[v] || { bg: '#ff6b35', fg: '#fff' }; }

function genId() {
 const c = () => CONSONANTS[Math.floor(Math.random() * CONSONANTS.length)];
 const d = () => DIGITS[Math.floor(Math.random() * DIGITS.length)];
 return c()+c()+d()+d()+c()+c();
}

let playerId = localStorage.getItem('numboom-id');
if (!playerId) { playerId = genId(); localStorage.setItem('numboom-id', playerId); }
document.getElementById('player-id').textContent = playerId;

let board, queue, selectedCol, score, gameOver, isMobile;

function startGame() {
 document.getElementById('start-screen').style.display = 'none';
 init();
}
window.startGame = startGame;

function init() {
 score = 0; gameOver = false; selectedCol = 0;
 document.getElementById('score').textContent = '0';
 document.getElementById('overlay').classList.remove('show');
 board = Array.from({length: ROWS}, () => Array.from({length: COLS}, () => ({value: 0})));
 queue = Array.from({length: QUEUE_SIZE + 10}, randomCard);
 isMobile = window.innerWidth <= 600 || 'ontouchstart' in window;
 document.getElementById('drop-btn').style.display = isMobile ? 'block' : 'none';
 document.getElementById('pc-hint').style.display  = isMobile ? 'none'  : 'block';
 buildGrid(); buildColButtons(); updateQueueUI(); renderBoard(); highlightCol();
}

function randomCard() {
 // 폭탄 확률 10% (넘넘의 과일 5%보다 높게 — 도전감)
 if (Math.random() < 0.10) {
   return { bomb: BOMB_CARDS[Math.floor(Math.random() * BOMB_CARDS.length)] };
 }
 const weights = [60, 40];
 let r = Math.random() * 100;
 for (let i = 0; i < NUMBER_CARDS.length; i++) {
   r -= weights[i];
   if (r <= 0) return { value: NUMBER_CARDS[i] };
 }
 return { value: NUMBER_CARDS[0] };
}

function isBomb(cell) { return cell && cell.bomb != null; }
function isEmpty(cell) { return !isBomb(cell) && (!cell.value || cell.value === 0); }

function buildGrid() {
 const grid = document.getElementById('grid'); grid.innerHTML = '';
 for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
   const cell = document.createElement('div');
   cell.className = 'cell'; cell.id = `cell-${r}-${c}`; grid.appendChild(cell);
 }
}

function buildColButtons() {
 const container = document.getElementById('col-buttons'); container.innerHTML = '';
 for (let c = 0; c < COLS; c++) {
   const btn = document.createElement('button');
   btn.className = 'col-btn' + (c===selectedCol?' selected':'');
   btn.textContent = '▼';
   btn.addEventListener('click', () => {
     selectedCol = c; highlightCol();
     if (isMobile) return;
     dropCard();
   });
   container.appendChild(btn);
 }
}

function highlightCol() {
 document.querySelectorAll('.col-btn').forEach((btn,i) => btn.classList.toggle('selected', i===selectedCol));
}

function renderBoard(effectSet) {
 for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
   const el = document.getElementById(`cell-${r}-${c}`);
   const d = board[r][c];
   el.classList.remove('bomb-anim', 'vanish-anim', 'bomb-cell'); void el.offsetWidth;
   if (effectSet && effectSet.has(`${r}-${c}-bomb`)) el.classList.add('bomb-anim');
   if (effectSet && effectSet.has(`${r}-${c}-vanish`)) el.classList.add('vanish-anim');

   if (isBomb(d)) {
     el.classList.add('bomb-cell');
     el.style.background = BOMB_BG[d.bomb.emoji] || '#555';
     el.style.color = '#fff';
     el.textContent = d.bomb.emoji;
     el.style.fontSize = '2rem';
   } else if (d.value > 0) {
     const col = getColor(d.value);
     el.style.background = col.bg; el.style.color = col.fg;
     el.textContent = d.value;
     el.style.fontSize = fontSize(d.value);
   } else {
     el.style.background = '#222'; el.style.color = '#555';
     el.textContent = ''; el.style.fontSize = '1.4rem';
   }
   el.style.border = 'none';
 }
}

function fontSize(v) {
 if (v >= 10000) return '0.85rem';
 if (v >= 1000) return '1rem';
 if (v >= 100) return '1.2rem';
 return '1.4rem';
}

function updateQueueUI() {
 for (let i = 0; i < QUEUE_SIZE; i++) {
   const el = document.getElementById(`q${i}`); if (!el) continue;
   const card = queue[i];
   el.className = 'queue-card' + (i===0 ? ' active' : '');
   if (!card) { el.textContent = ''; el.style.background = '#333'; return; }
   if (isBomb(card)) {
     el.classList.add('bomb');
     el.textContent = card.bomb.emoji;
     el.style.background = i===0 ? (BOMB_BG[card.bomb.emoji] || '#555') : '#333';
     el.style.color = '#fff';
     el.style.fontSize = '1.8rem';
   } else {
     el.textContent = card.value;
     el.style.background = i===0 ? '#555' : '#333';
     el.style.color = i===0 ? '#eee' : '#777';
     el.style.fontSize = '1.2rem';
   }
 }
}

function dropCard() {
 if (gameOver) return;
 const col = selectedCol;
 const card = queue[0];

 let targetRow = -1;
 for (let r = ROWS-1; r >= 0; r--) {
   if (isEmpty(board[r][col])) { targetRow = r; break; }
 }
 if (targetRow === -1) { checkGameOver(); return; }

 const effectSet = new Set();

 if (isBomb(card)) {
   board[targetRow][col] = { bomb: card.bomb };
   applyBombEffect(targetRow, col, effectSet);
   board[targetRow][col] = { value: 0 }; // 폭탄 항상 사라짐
   applyGravityAll();
   runMergeLoopAll(effectSet);
 } else {
   board[targetRow][col] = { value: card.value };
   applyGravityAll();
   runMergeLoop(targetRow, col, effectSet);
 }

 queue.shift(); queue.push(randomCard()); updateQueueUI();
 renderBoard(effectSet);
 checkGameOver();
}

// 폭탄 효과: 인접한 모든 숫자에 적용
function applyBombEffect(r, c, effectSet) {
 const cell = board[r][c];
 if (!isBomb(cell)) return;
 const bomb = cell.bomb;
 const dirs = [[-1,0],[1,0],[0,-1],[0,1]];

 for (const [dr,dc] of dirs) {
   const nr=r+dr, nc=c+dc;
   if (nr<0||nr>=ROWS||nc<0||nc>=COLS) continue;
   if (board[nr][nc].value > 0) {
     if (bomb.div === 0) {
       // ☢️ 소멸
       board[nr][nc] = { value: 0 };
       effectSet.add(`${nr}-${nc}-vanish`);
     } else {
       const oldVal = board[nr][nc].value;
       if (oldVal % bomb.div === 0) {
         // 나누어 떨어짐 → 나눗셈
         const newVal = oldVal / bomb.div;
         score = Math.max(0, score - (oldVal - newVal)); // 점수 감소
         document.getElementById('score').textContent = score;
         board[nr][nc] = { value: newVal };
         effectSet.add(`${nr}-${nc}-bomb`);
       } else {
         // 나누어 떨어지지 않음 → 소멸
         board[nr][nc] = { value: 0 };
         effectSet.add(`${nr}-${nc}-vanish`);
       }
     }
   }
 }
 board[r][c] = { value: 0 };
}

function runMergeLoop(newR, newC, effectSet) {
 let q = [{r:newR, c:newC}];
 while (q.length > 0) {
   const next = [];
   for (const {r,c} of q) {
     if (!board[r][c].value || board[r][c].value===0) continue;
     const val = board[r][c].value;
     const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
     for (const [dr,dc] of dirs) {
       const nr=r+dr, nc=c+dc;
       if (nr<0||nr>=ROWS||nc<0||nc>=COLS) continue;
       if (board[nr][nc].value===val) {
         const newVal = val*2;
         score += newVal;
         document.getElementById('score').textContent = score;
         board[nr][nc] = {value:newVal}; board[r][c] = {value:0};
         effectSet.add(`${nr}-${nc}-bomb`); next.push({r:nr,c:nc});
         if (newVal>=256) fireConfetti();
         break;
       }
     }
   }
   applyGravityAll();
   if (next.length===0) {
     const seen = new Set();
     for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) {
       const cur = board[r][c]; if (!cur.value||cur.value===0) continue;
       const dirs=[[-1,0],[1,0],[0,-1],[0,1]];
       for (const [dr,dc] of dirs) {
         const nr=r+dr,nc=c+dc;
         if (nr<0||nr>=ROWS||nc<0||nc>=COLS) continue;
         if (board[nr][nc].value===cur.value) {
           const key=`${r}-${c}`;
           if (!seen.has(key)) { next.push({r,c}); seen.add(key); seen.add(`${nr}-${nc}`); }
           break;
         }
       }
     }
   }
   q = next;
 }
}

function runMergeLoopAll(effectSet) {
 for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) {
   if (board[r][c].value > 0) { runMergeLoop(r, c, effectSet); return; }
 }
}

function applyGravityAll() {
 for (let c=0;c<COLS;c++) compactDown(c);
}

function compactDown(c) {
 let writeRow = ROWS-1;
 for (let r=ROWS-1;r>=0;r--) {
   if (!isEmpty(board[r][c])) {
     if (r!==writeRow) { board[writeRow][c]={...board[r][c]}; board[r][c]={value:0}; }
     writeRow--;
   }
 }
 for (let r=writeRow;r>=0;r--) board[r][c]={value:0};
}

async function checkGameOver() {
 for (let c = 0; c < COLS; c++) { if (isEmpty(board[0][c])) return; }
 gameOver = true;
 document.getElementById('final-score').textContent = score.toLocaleString();
 document.getElementById('save-score-btn').disabled = false;
 document.getElementById('save-score-btn').textContent = '💾 점수 저장';
 document.getElementById('overlay').classList.add('show');
}

async function saveAndShowRank() {
 try {
   await addDoc(collection(db, 'scores'), {
     id: playerId, mode: MODE, score: score, ts: Date.now()
   });
 } catch(e) {}
 try {
   const q = query(
     collection(db, 'scores'),
     where('mode', '==', MODE),
     where('score', '>', score)
   );
   const snapshot = await getCountFromServer(q);
   return snapshot.data().count + 1;
 } catch(e) { return null; }
}

async function loadRanking() {
 try {
   const q = query(
     collection(db, 'scores'),
     where('mode', '==', MODE),
     orderBy('score', 'desc'),
     limit(10)
   );
   const snap = await getDocs(q);
   const list = document.getElementById('ranking-list');
   list.innerHTML = '';
   let rank = 1;
   snap.forEach(doc => {
     const d = doc.data();
     const row = document.createElement('div');
     row.className = 'rank-row';
     row.innerHTML = `<span class="rank-num">${rank}</span><span class="rank-id">${d.id}</span><span class="rank-score">${d.score.toLocaleString()}</span>`;
     list.appendChild(row);
     rank++;
   });
 } catch(e) {}
}

function fireConfetti() {
 const canvas = document.createElement('canvas');
 canvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;z-index:99999;pointer-events:none;';
 document.body.appendChild(canvas);
 const myConfetti = confetti.create(canvas, {resize:true});
 myConfetti({particleCount:80,angle:60,spread:70,origin:{x:0,y:0.7}});
 myConfetti({particleCount:80,angle:120,spread:70,origin:{x:1,y:0.7}});
 setTimeout(()=>canvas.remove(),4000);
}

document.addEventListener('keydown', e => {
 if (gameOver) return;
 if (e.key==='ArrowLeft')  { e.preventDefault(); selectedCol=Math.max(0,selectedCol-1); highlightCol(); }
 if (e.key==='ArrowRight') { e.preventDefault(); selectedCol=Math.min(COLS-1,selectedCol+1); highlightCol(); }
 if (e.key==='Enter'||e.key===' ') { e.preventDefault(); dropCard(); }
});

document.getElementById('drop-btn').addEventListener('click', dropCard);
document.getElementById('restart-btn').addEventListener('click', init);

document.getElementById('save-score-btn').addEventListener('click', async function() {
 this.disabled = true;
 this.textContent = '저장 중...';
 const myRank = await saveAndShowRank();
 this.textContent = myRank ? `✅ 저장 완료 · 🏆 ${myRank}위` : '✅ 저장 완료';
});

document.getElementById('ranking-btn').addEventListener('click', async function() {
 const area = document.getElementById('ranking-area');
 if (area.style.display === 'block') {
   area.style.display = 'none';
   this.textContent = '🏆 순위 보기';
   return;
 }
 this.textContent = '불러오는 중...';
 await loadRanking();
 area.style.display = 'block';
 this.textContent = '🏆 순위 닫기';
});
</script>
